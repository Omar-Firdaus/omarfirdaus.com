<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omar Firdaus</title>
  <link rel="alternate" type="application/rss+xml" title="Omar Firdaus" href="feed.xml">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      --g: 8px;
      --card-width: min(420px, 88vw);
      --gallery-filter: grayscale(100%);
      background: #111;
      color: #2c2c2c;
      overflow: hidden;
      height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: inherit;
    }

    .landing {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .gallery-section {
      width: 100%;
      height: 100%;
      background: #fff;
    }

    .gallery-grid {
      --g: 8px;
      display: grid;
      grid-template-columns: repeat(96, 1fr);
      grid-auto-rows: calc((100vw - 97 * var(--g)) / 96);
      grid-auto-flow: dense;
      gap: var(--g);
      padding: var(--g);
      height: 100%;
      overflow: hidden;
    }

    .span-p-sm { grid-column: span 12; grid-row: span 16; }
    .span-p-md { grid-column: span 12; grid-row: span 16; }
    .span-l-sm { grid-column: span 24; grid-row: span 16; }
    .span-l-lg { grid-column: span 24; grid-row: span 16; }

    .gallery-cell {
      position: relative;
      overflow: hidden;
      line-height: 0;
    }

    .gallery-media {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: var(--gallery-filter, none);
      transition: filter 0.35s ease;
    }

    .gallery-cell:hover .gallery-media {
      filter: none;
    }

    .hero-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-center {
      pointer-events: auto;
      width: var(--card-width);
      max-width: calc(100vw - 2 * var(--g));
    }

    .content-card {
      background: #faf9f6;
      width: 100%;
      padding: 1.1rem 1.25rem 1.15rem;
      text-align: center;
      line-height: 1.55;
      border: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .content-card-name {
      font-family: "Times New Roman", Times, serif;
      font-size: 1.45rem;
      font-weight: 400;
      color: #111;
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }

    .content-card-tagline {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .content-card-socials {
      display: flex;
      justify-content: center;
      gap: 0.55rem;
      margin-bottom: 0.5rem;
    }

    .content-card-social {
      color: #aaa;
      display: flex;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .content-card-social:hover {
      color: #333;
    }

    .content-card-social svg {
      width: 16px;
      height: 16px;
    }

    .content-card-ssh {
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      font-size: 0.78rem;
      color: #666;
      background: rgba(0, 0, 0, 0.04);
      padding: 0.4rem 0.65rem;
      display: inline-block;
      border: 1px solid rgba(0, 0, 0, 0.06);
      margin-bottom: 0.65rem;
    }

    .content-card-footer {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.78rem;
      color: #999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .content-card-footer a {
      color: #888;
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .content-card-footer a:hover {
      color: #333;
      text-decoration: underline;
      text-decoration-color: rgba(0, 0, 0, 0.2);
      text-underline-offset: 3px;
    }

    .content-card-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: #aaa;
      letter-spacing: 0.02em;
    }

    .content-card-nav .sep {
      color: #d4d4d4;
      user-select: none;
    }

    @media (max-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(48, 1fr);
        grid-auto-rows: calc((100vw - 49 * var(--g)) / 48);
      }
    }

    @media (max-width: 640px) {
      .gallery-grid {
        grid-template-columns: repeat(24, 1fr);
        grid-auto-rows: calc((100vw - 25 * var(--g)) / 24);
      }

      .span-p-sm,
      .span-p-md {
        grid-column: span 12;
        grid-row: span 16;
      }

      .span-l-sm,
      .span-l-lg {
        grid-column: span 24;
        grid-row: span 16;
      }

      .content-card {
        padding: 1rem 1.1rem;
      }

      .content-card-name {
        font-size: 1.3rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .gallery-media {
        transition: none;
      }
    }
  </style>
</head>

  <script>
    const PHOTOS = [
      { src: "IMG_5280.JPG", span: "l-sm" },
      { src: "IMG_3775.jpg", span: "p-sm" },
      { src: "DSCN0894.jpg", span: "p-sm" },
      { src: "IMG_5564.JPG", span: "p-sm" },
      { src: "IMG_5193.jpg", span: "l-sm" },
      { src: "Unitree.jpg", span: "p-sm" },
      { src: "photos/IMG_0450.jpg", span: "p-sm" },
      { src: "IMG_4786.jpg", span: "l-sm" },
      { src: "photos/wel-polit.jpg", span: "p-sm" },
      { src: "PICT0059.JPG", span: "p-sm" },
      { src: "IMG_4946.JPG", span: "p-sm" },
      { src: "IMG_4789.jpg", span: "l-sm" },
      { src: "IMG_1463.jpg", span: "p-sm" },
      { src: "FullSizeRender.jpg", span: "l-sm" },
      { src: "7175231636158503780.JPEG", span: "p-sm" },
      { src: "Tezza-9606.jpg", span: "l-sm" },
      { src: "IMG_9591.PNG", span: "p-sm" },
      { src: "DSCN0912.JPG", span: "p-sm" },
      { src: "photos/IMG_0434.jpg", span: "l-sm" },
      { src: "photos/photo-candid.jpeg", span: "l-sm" },
      { src: "photos/IMG_2650.jpg", span: "p-sm" },
      { src: "D3ED16FD-E7F7-41E9-A7D2-23479A29C281.JPEG", span: "l-sm" },
      { src: "photos/IMG_4810.jpg", span: "p-sm" },
    ];

    const SPANS = ["p-sm", "p-md", "l-sm", "l-lg"];

    function buildGallery() {
      const grid = document.getElementById("gallery-grid");
      grid.innerHTML = "";

      const tiles = [];
      for (let round = 0; round < 4; round += 1) {
        for (let i = 0; i < PHOTOS.length; i += 1) {
          const photo = PHOTOS[i];
          const span = round === 0 ? photo.span : SPANS[(i + round) % SPANS.length];
          tiles.push({ src: photo.src, span });
        }
      }

      for (const tile of tiles) {
        const cell = document.createElement("div");
        cell.className = `gallery-cell span-${tile.span}`;
        const img = document.createElement("img");
        img.src = tile.src;
        img.alt = "";
        img.className = "gallery-media";
        img.decoding = "async";
        img.loading = "lazy";
        cell.appendChild(img);
        grid.appendChild(cell);
      }
    }

    function layoutGrid() {
      const grid = document.getElementById("gallery-grid");
      if (!grid || !grid.children.length) return;

      const cs = getComputedStyle(grid);
      const cell = parseFloat(cs.gridTemplateColumns.split(" ")[0]);
      const gap = parseFloat(cs.rowGap) || 0;
      if (!cell) return;

      grid.style.gridAutoRows = `${cell}px`;

      const viewportRows = Math.ceil((window.innerHeight - gap * 2 + gap) / (cell + gap));
      const minTiles = viewportRows * 8;
      while (grid.children.length < minTiles) {
        const photo = PHOTOS[grid.children.length % PHOTOS.length];
        const span = SPANS[grid.children.length % SPANS.length];
        const cellEl = document.createElement("div");
        cellEl.className = `gallery-cell span-${span}`;
        const img = document.createElement("img");
        img.src = photo.src;
        img.alt = "";
        img.className = "gallery-media";
        img.decoding = "async";
        img.loading = "lazy";
        cellEl.appendChild(img);
        grid.appendChild(cellEl);
      }

      const top = grid.getBoundingClientRect().top;
      let maxBottom = 0;
      for (const item of grid.children) {
        const bottom = item.getBoundingClientRect().bottom - top;
        if (bottom > maxBottom) maxBottom = bottom;
      }

      const pitch = cell + gap;
      const rows = Math.ceil((window.innerHeight - gap * 2 + gap) / pitch);
      const snapped = rows * pitch - gap;
      grid.style.height = `${Math.max(snapped, maxBottom)}px`;
    }

    buildGallery();
    window.addEventListener("load", () => {
      setTimeout(layoutGrid, 100);
      setTimeout(layoutGrid, 800);
    });

    let raf = 0;
    window.addEventListener("resize", () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(layoutGrid);
    });
  </script>

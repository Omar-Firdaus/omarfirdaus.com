<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omar Firdaus</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      --g: 8px;
      --card-width: min(840px, 90vw);
      background: #fff;
      color: #2c2c2c;
      overflow-x: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: inherit;
    }

    .gallery-section {
      --g: 8px;
      --gallery-filter: grayscale(100%);
      width: 100%;
      background: #fff;
    }

    .landing {
      position: relative;
      min-height: 100vh;
    }

    .hero-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-center {
      pointer-events: auto;
      width: var(--card-width);
      max-width: calc(100vw - 2 * var(--g));
    }

    .content-card {
      background: #faf9f6;
      width: 100%;
      padding: 1.6rem 2.4rem;
      text-align: center;
      line-height: 1.5;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    /* Uniform 16-row band — tiles pack tight, no white holes */
    .span-p-sm { grid-column: span 12; grid-row: span 16; }
    .span-p-md { grid-column: span 12; grid-row: span 16; }
    .span-p-lg { grid-column: span 12; grid-row: span 16; }
    .span-l-sm { grid-column: span 24; grid-row: span 16; }
    .span-l-lg { grid-column: span 24; grid-row: span 16; }

    .content-cell-sm {
      grid-column: span 24;
      grid-row: span 16;
    }

    .gallery-cell {
      position: relative;
      overflow: hidden;
      line-height: 0;
    }

    .gallery-media {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: var(--gallery-filter, none);
      transition: filter 0.35s ease;
    }

    .gallery-cell:hover .gallery-media {
      filter: none;
    }

    .content-cell {
      line-height: 1.55;
      overflow: hidden;
    }

    .gallery-grid {
      --g: 8px;
      display: grid;
      grid-template-columns: repeat(96, 1fr);
      grid-auto-rows: calc((100vw - 97 * var(--g)) / 96);
      grid-auto-flow: dense;
      gap: var(--g);
      padding: var(--g);
    }

    .content-card-name {
      font-family: "Times New Roman", Times, serif;
      font-size: 1.7rem;
      font-weight: 400;
      color: #111;
      letter-spacing: 0.1em;
      line-height: 1.2;
      margin-bottom: 0.45rem;
      text-transform: uppercase;
    }

    .content-card-tagline {
      font-family: "Times New Roman", Times, serif;
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 0.65rem;
    }

    .content-card-links {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-family: "Times New Roman", Times, serif;
      font-size: 0.82rem;
      color: #444;
      margin-bottom: 0.8rem;
    }

    .content-card-links a {
      color: #555;
      text-decoration: underline;
      text-decoration-color: rgba(0, 0, 0, 0.15);
      text-underline-offset: 2px;
      transition: color 0.15s ease;
    }

    .content-card-links a:hover {
      color: #111;
    }

    .content-card-ssh {
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      font-size: 0.78rem;
      color: #666;
      background: rgba(0, 0, 0, 0.04);
      padding: 0.45rem 0.6rem;
      display: inline-block;
      border: 1px solid rgba(0, 0, 0, 0.06);
      margin-bottom: 0.5rem;
      word-break: break-all;
    }

    .content-card-email {
      font-family: "Times New Roman", Times, serif;
      font-size: 0.8rem;
      margin-top: 0.35rem;
    }

    .content-card-email a {
      color: #555;
      text-decoration: underline;
      text-decoration-color: rgba(0, 0, 0, 0.15);
      text-underline-offset: 2px;
      transition: color 0.15s ease;
    }

    .content-card-email a:hover {
      color: #111;
    }

    @media (max-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(48, 1fr);
        grid-auto-rows: calc((100vw - 49 * var(--g)) / 48);
      }
    }

    @media (max-width: 640px) {
      .gallery-grid {
        grid-template-columns: repeat(24, 1fr);
        grid-auto-rows: calc((100vw - 25 * var(--g)) / 24);
      }

      .span-p-sm,
      .span-p-md,
      .span-p-lg {
        grid-column: span 12;
        grid-row: span 16;
      }

      .span-l-sm,
      .span-l-lg {
        grid-column: span 24;
        grid-row: span 16;
      }

      .content-cell-sm {
        grid-column: span 24;
      }

      .hero-center {
        --card-width: calc(100vw - 2 * var(--g));
        width: var(--card-width);
      }

      .content-card-name {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>

  <script>
    function layoutGrid(grid) {
      if (!grid || !grid.children.length) return;

      grid.style.height = '';
      grid.style.overflow = '';

      const cs = getComputedStyle(grid);
      const cell = parseFloat(cs.gridTemplateColumns.split(' ')[0]);
      const gap = parseFloat(cs.rowGap) || 0;
      if (!cell) return;

      grid.style.gridAutoRows = `${cell}px`;
    }

    function runLayout() {
      layoutGrid(document.getElementById('gallery-grid'));
    }

    window.addEventListener('load', () => {
      setTimeout(runLayout, 150);
      setTimeout(runLayout, 1200);
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(runLayout);
      }
    });

    let raf = 0;
    window.addEventListener('resize', () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(runLayout);
    });
  </script>
